name: tests

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pytest:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install test dependencies
        # The test suite needs torch, numpy, pytest, and now scipy
        # (for the Wilcoxon signed-rank test in the statistics
        # module). Heavier deps (datasets, chromadb, transformers,
        # matplotlib) remain CI-excluded because no test imports
        # them. Versions match requirements.txt pins.
        run: |
          python -m pip install --upgrade pip
          python -m pip install \
            "torch==2.12.0" \
            "numpy==2.4.6" \
            "scipy==1.16.3" \
            "pytest==9.0.3"

      - name: Run pytest
        run: python -m pytest tests/ -v
