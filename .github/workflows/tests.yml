name: tests

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pytest:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install test dependencies
        # Phase-1 unit tests only need torch, numpy, and pytest. Heavier
        # deps (datasets, chromadb, transformers, matplotlib) are
        # required by experiment scripts but not by the test suite, so
        # we keep CI lean. Versions match requirements.txt pins.
        run: |
          python -m pip install --upgrade pip
          python -m pip install \
            "torch==2.12.0" \
            "numpy==2.4.6" \
            "pytest==9.0.3"

      - name: Run pytest
        run: python -m pytest tests/ -v
